name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "24"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --no-daemon --stacktrace

  # End-to-end suite: boots the example server and drives it with the real
  # @connectrpc/connect-web client (see tools/e2e-connect-web).
  e2e-connect-web:
    name: e2e (connect-web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "24"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Pre-build the runnable jar so the e2e launches it directly (E2E_SKIP_BUILD).
      - name: Build the example server
        run: ./gradlew :project:app-server-spring:bootJar --no-daemon --stacktrace

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Corepack runs the pnpm version pinned by packageManager in package.json.
      - name: Enable pnpm
        run: corepack enable

      - name: Install e2e dependencies
        working-directory: tools/e2e-connect-web
        run: pnpm install --frozen-lockfile

      - name: Run the connect-web e2e suite
        working-directory: tools/e2e-connect-web
        run: pnpm test
        env:
          E2E_SKIP_BUILD: "1"
